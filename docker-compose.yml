services:
    backend:
        build: ./backend
        image: ghcr.io/axenos-gr/wedding/backend:latest
        container_name: wedding-backend
        env_file: .env.backend
        ports:
            - "127.0.0.1:6000:6000"
        restart: always
        environment:
            - TZ=Asia/Almaty
    frontend:
        build: ./frontend
        image: ghcr.io/axenos-gr/wedding/frontend:latest
        container_name: wedding-frontend
        ports:
            - "127.0.0.1:6001:6001"
        restart: always
        environment:
            - TZ=Asia/Almaty

volumes:
    pgdata:
